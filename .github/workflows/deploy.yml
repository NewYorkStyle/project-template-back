name: Build and deploy Docker (back)

on:
  workflow_run:
    workflows: ['Release back']
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set image name
        id: image
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.image.outputs.image }}:${{ steps.tag.outputs.tag }} .
          docker tag ${{ steps.image.outputs.image }}:${{ steps.tag.outputs.tag }} ${{ steps.image.outputs.image }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.image }}:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.image.outputs.image }}:latest

  deploy:
    runs-on: ubuntu-22.04
    needs: docker

    steps:
      - name: Deploy back
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/deployer/project-template-deploy
            chmod +x deploy.sh 
            ./deploy.sh backend
