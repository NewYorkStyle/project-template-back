# Только инфраструктура для локальной разработки: Postgres и Redis.
# Бэкенд запускай на хосте: `pnpm dev` (см. README).
#
# Нужен `.env` с POSTGRES_*, REDIS_PORT и т.д. (скопируй из `.example.env`).
# В `.env` для приложения укажи `DATABASE_URL` и `REDIS_URL` на localhost
# (порты — как в POSTGRES_PORT и REDIS_PORT ниже).
#
# Запуск: docker compose -f docker-compose.dev.yaml up -d

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'

volumes:
  postgres_dev_data:
